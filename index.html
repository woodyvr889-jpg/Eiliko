<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eiliko AI Companion++</title>
<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial;overflow:hidden}
#robot{width:220px;height:220px;background:#1e293b;border-radius:30px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(59,130,246,.5);transition:.2s}
.eyes{display:flex;gap:20px}
.eye{width:30px;height:30px;background:#3b82f6;border-radius:50%}
#mouth{width:60px;height:10px;background:#3b82f6;border-radius:10px;margin-top:20px;transition:.2s}
#status{position:absolute;bottom:10px;width:100%;text-align:center;font-size:14px}
#menu{position:absolute;top:10px;right:10px;background:#111;padding:10px;border-radius:10px;display:none;width:200px}
button{margin:5px;padding:8px;border:none;border-radius:8px;background:#3b82f6;color:#fff}
input{width:100%}
</style>
</head>
<body><div id="robot">
<div class="eyes"><div class="eye"></div><div class="eye"></div></div>
<div id="mouth"></div>
</div><div id="status">Say "Hey Eiliko"</div>
<button style="position:absolute;top:10px;left:10px" onclick="toggleMenu()">⚙️</button><div id="menu">
<h4>Settings</h4>
Volume <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
Voice Speed <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
</div><script>
let mood=50;
let listening=false;
let memory=JSON.parse(localStorage.getItem('eilikoMemory')||'{}');
const status=document.getElementById('status');

function saveMemory(){localStorage.setItem('eilikoMemory',JSON.stringify(memory));}

function speak(text){
const msg=new SpeechSynthesisUtterance(text);
msg.volume=document.getElementById('volume').value;
msg.rate=document.getElementById('rate').value;
speechSynthesis.speak(msg);
}

// 🔥 REAL AI FUNCTION (EDIT THIS)

// ⚠️ YOU MUST ADD YOUR OWN API KEY
const API_KEY = "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";

const res = await fetch("https://api.openai.com/v1/chat/completions",{

// 🎤 SPEECH RECOGNITION
window.SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

if(window.SpeechRecognition){
const rec=new SpeechRecognition();
rec.continuous=true;

status.innerText='Tap to enable mic';

document.body.addEventListener('click',()=>{
rec.start();
status.innerText='Listening for "Hey Eiliko"';
},{once:true});

rec.onresult=async(e)=>{
const text=e.results[e.results.length-1][0].transcript.toLowerCase();

if(text.includes('hey eiliko')){
listening=true;
speak('Yes?');
status.innerText='Listening...';
return;
}

if(listening){
status.innerText='You: '+text;

let reply = await askAI(text);

speak(reply);
memory.lastConversation = {user:text, ai:reply};
saveMemory();

listening=false;
status.innerText='Say "Hey Eiliko"';
}
};
}

function toggleMenu(){
const m=document.getElementById('menu');
m.style.display=m.style.display==='none'?'block':'none';
}

</script></body>
</html>
